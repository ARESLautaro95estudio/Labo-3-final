<script>

    function ejercicio1()
    {
        let div = document.getElementById('divej1');
        div.textContent = "Iniciando consulta.....";
        let request = new XMLHttpRequest();

        request.open('GET','https://examenesutn.vercel.app/api/VehiculoAutoCamion2');
        request.setRequestHeader('Content-type',"aplication/json");
        request.onreadystatechange = function (){
            if (request.readyState == 4)
            {
                let div = document.getElementById('divej1');
                if (request.status == 200)
                {   
                    const data = JSON.parse(request.responseText);
                    data.forEach(element => {
                        div.innerHTML += `<p><strong>
                            /////<br>
                            <ul>
                            <li>Modelo : ${element.modelo}<br></li>
                            <li>año : ${element.anoFabricacion}</li>
                            </ul>
                            <br>/////</strong></p>`;
                    });
                }
                else
                {
                    div.innerHTML += `<p><strong>
                    /////<br>
                    <ul>
                    <li>Error<br></li>
                    <li>info : ${request.responseText}<br></li>
                    </ul>
                    <br>/////</strong></p>`;
                }


            }
        }
        // request.send();
    }
   
    ejercicio1();

    

    function ejercicio1Fetch()
    {
        fetch('https://examenesutn.vercel.app/api/VehiculoAutoCamion',{
            method:"GET",
            headers:{"Content-Type":"application/json"},
            // body:JSON.stringify('{'id':1}')
        })
        .then( data => data.json())
        .then(data =>{
            // console.log(data);
            let div = document.getElementById('divej1');
            data.forEach((d)=>{
                console.log(d.modelo)
                div.innerHTML += `<p><strong>
                            /////<br>
                            <ul>
                            <li>Modelo : ${d.modelo}<br></li>
                            <li>año : ${d.anoFabricacion}</li>
                            </ul>
                            <br>/////</strong></p>`;
            })
        })
        .catch()
        .finally()
    }


    ejercicio1Fetch();

    function insertarTexto(texo){
        let div = document.getElementById("respuestas");
        let p = document.createElement("p");
        p.appendChild(document.createTextNode(texo));
        div.appendChild(p);
    }


    var url = "https://examenesutn.vercel.app/api/VehiculoAutoCamion"

    async function getFetch(){
        let respuesta = await fetch(url,{
            method:"GET"
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado getFech()");
        insertarTexto(texto);
    }

    async function deleteFetch(){
        let respuesta = await fetch(url,{
            method:"DELETE", 
            headers: {
                'Content-Type': 'application/json'
            },
            body:('{"id":1}')
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado deleteFetch()");
        insertarTexto(texto);
    }

    async function putFetch(){
        let respuesta = await fetch(url,{
            method:"PUT", 
            headers: {
                'Content-Type': 'application/json'
            },
            body:('{"id":122, "modelo":"Fiat 100","anoFabricacion":1987,"velMax":60,"cantidadPuertas":4,"asientos":4}')
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado putFetch() Con ID");
        insertarTexto(texto);
    }

    async function putFetchFutbolista(){
        let respuesta = await fetch(url,{
            method:"PUT", 
            headers: {
                'Content-Type': 'application/json'
            },
            body:('{"modelo":"Chevy Silverado","anoFabricacion":1994,"velMax":80,"cantidadPuertas":1000,"asientos":450}')
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado putFetch() Sin ID");
        insertarTexto(texto);
    }

    async function postFetch(){
        let respuesta = await fetch(url,{
            method:"POST", 
            headers: {
                'Content-Type': 'application/json'
            },
            body:('{"modelo":"Ford Mustang","anoFabricacion":1960,"velMax":100,"cantidadPuertas":2,"asientos":2}')
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado postFetch() Sin ID");
        insertarTexto(texto);
    }

    async function postFetchFutbolista(){
        let respuesta = await fetch(url,{
            method:"POST", 
            headers: {
                'Content-Type': 'application/json'
            },
            body:('{"id":5,"modelo":"Dodge Ram","anoFabricacion":1970,"velMax":100,"cantidadPuertas":2333,"asientos":400}')
        })
        let texto = await respuesta.text();
        insertarTexto("Resultado postFetch() Con ID");
        insertarTexto(texto);
    }

    async function ejecutarPruebas(){
        await getFetch();
        await postFetch();
        await postFetchFutbolista();
        await putFetch();
        await putFetchFutbolista();
        await deleteFetch();
    }

    ejecutarPruebas();
