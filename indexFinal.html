// Realizar las siguientes acciones en el orden especificado. Utilice el objeto XMLHttpRequest.

// 2do-Realice una consulta utilizando el método GET sobre el endpoint:
// https://examenesutn.vercel.app/api/VehiculoAutoCamion
// 3ro-En caso de que la consulta se resuelva exitosamente, Apendizar en el div con id="ej1" el texto "éxito" y los
// elementos recibidos como resultado de la consulta. De lo contrario Apendizar en el div con id="ej1" el texto "fracaso" y

    function ejercicio1() {
        const div = document.getElementById('ej1');
        div.innerHTML += 'Iniciando Consulta';
        let xhr = new XMLHttpRequest(); //se instancia


        xhr.open('GET', 'https://examenesutn.vercel.app/api/VehiculoAutoCamion'); // se abre con el metodo y el url 
        
        // se setea el header para indicar que se espera una respuesta en formato JSON
        xhr.setRequestHeader('Content-Type', 'application/json');
        
        xhr.onreadystatechange = function () {
            // en la funcion onreadystatchange se le asgigna la funcion
            //  para el control de la respuesta
            if (xhr.status === 200) {
                //se llama al atributo status para validar el codigo de la respuesta 
                div.innerHTML += '<br> éxito';
                // se parsea con JSON.parse() el atributo responseText
                const datos = JSON.parse(xhr.responseText);
                datos.forEach(item => {
                    //se parsea a json con JSON.stringify los items del json anterior 
                    div.innerHTML += JSON.stringify(item) + '<br>';
                });
            } else {
                div.innerHTML += ' <br> fracaso';
                //se toma el texto de la respuesta de responseText para mostrar el error 
                div.innerHTML += xhr.responseText;
            }
        };
        //se envia la peticion ya armad con .send 
        xhr.send();
    }
    ejercicio1();

    function insertarTexto(texo){
        let div = document.getElementById("respuestas");
        let p = document.createElement("p");
        p.appendChild(document.createTextNode(texo));
